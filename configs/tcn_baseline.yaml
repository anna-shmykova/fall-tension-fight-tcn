exp:
  name: dev_minimal
  seed: 42

paths:
  data_root: /home/anna/TCN_TRAIN/data/dataset_v0   # change to your real json root
  runs_root: /home/anna/TCN_TRAIN/outputs/runs

data:
  max_persons: 25
  window_size: 16
  window_step: 4
  split: fixed

window_labels:
  rule: train_like        # choices: train_like, target, any_overlap, overlap_frac, soft_last_k
  positive_overlap: 0.30  # used when rule=overlap_frac
  soft_k: 4               # used when rule=soft_last_k

features:
  # match what your current frame_to_vector does
  use_bbox: true
  use_keypoints: true
  motion:
    enabled: false
    source: erez
    align: prev

labels:
  # match your current events_to_label
  task: binary
  window_policy: center
  drop_mixed_windows: true

model:
  encoder_type: intraperson_graph
  person_emb_dim: 32
  use_graph: true
  use_attention_readout: true
  pool_mode: mean_max_std
  tcn_input_mode: pooled_count
  use_person_count: true
  motion_proj_dim: 32

train:
  device: cpu
  batch_size: 64
  epochs: 2
  lr: 0.0005
