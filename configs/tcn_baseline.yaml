exp:
  name: dev_minimal
  seed: 42

paths:
  data_root: /home/anna/TCN_TRAIN/data/dataset_v0   # change to your real json root
  runs_root: /home/anna/TCN_TRAIN/outputs/runs

data:
  max_persons: 25
  window_size: 16
  window_step: 4
  split: fixed

features:
  # match what your current frame_to_vector does
  use_bbox: true
  use_keypoints: true
  motion:
    enabled: false
    source: erez
    align: prev

labels:
  # match your current events_to_label
  task: binary
  window_policy: center
  drop_mixed_windows: true

model:
  pool_mode: attn
  tcn_input_mode: pooled_count
  motion_proj_dim: 32

train:
  device: cpu
  batch_size: 64
  epochs: 2
  lr: 0.0005
