exp:
  name: tcn_causal_mlp_last_aggr_pool_motion_21_ALL_DS_usual_loss_alpha_window_16_exclude_tens
  seed: 42

paths:
  data_root: /home/anna/TCN_TRAIN/datasets/dataset_v2  # change to your real json root
  runs_root: /home/anna/TCN_TRAIN/runs

data:
  label_mode: "binary_tension"   # or multi-class later
  target_mode: last # central
  window_size: 16
  window_step: 4
  fps: 25
  sample_every_n_frames: 5
  max_persons: 25

  # thresholds applied at training time (NOT during json creation)
  det_conf_keep: 0.6
  kp_conf_keep: 0.3

  split:
    mode: generate #"fixed" #"generate" codex resume 019d01bb-e3b5-7cb2-837a-6d40157793aa train_test_lists
    group_key: "video_id"
    seed: 42
    val_ratio: 0.2
    train_list: "fixed_splits/train_paths_all_ds.txt"
    val_list: "fixed_splits/val_paths_all_ds.txt" #"fixed_splits/val_paths.txt"
    test_list: #"fixed_splits/test_videos.txt"

window_labels:
  rule: target # train_like        # choices: train_like, target, any_overlap, overlap_frac
  positive_overlap: 0.30  # used when rule=overlap_frac

features:
  use_bbox: true
  use_keypoints: false
  use_quality_gates: true
  normalize: "bbox"   # "frame" or "bbox"
  motion:
    enabled: true
    source: erez
    align: prev       # prev avoids future leakage; next matches t->t+1 extraction
    num_features: 21  # keep the first N motion features from analyze_json_motion.py

model:
  type: "tcn"
  use_graph: false
  use_attention_readout: false   # true forces attn; false uses pool_mode below
  causal: true
  norm: group   # group recommended for strict causality during training
  hidden_dim: 64
  num_layers: 4
  dilations: [1, 2, 4, 8]
  kernel_size: 3
  dropout: 0.2
  mlp_out_dim: 32
  pool_mode: mean_max_std   # choices when attention is off: mean, max, mean_max, mean_max_std
  tcn_input_mode: pooled_count_motion   # choices: pooled_count, pooled_count_motion
  use_person_count: true
  motion_proj_dim: 32

train:
  batch_size: 32
  epochs: 15
  lr: 0.0005
  weight_decay: 0.0001
  pos_weight: 2.0
  grad_clip: 1.0
  early_stop_patience: 3
  num_workers: 0
  device: cuda
  agg_mode: last #last #logsumexp          # or logmeanexp (recommended) last
  logsumexp_temperature: 1.0
  end_loss_alpha: 0.1 #0.5          # 0.0 disables
  end_loss_k: 2                # last 4 steps = 0.8s at 5Hz
  save_all_checkpoints: true
  
eval:
  threshold_sweep:
    start: 0.01
    end: 0.99
    step: 0.01
