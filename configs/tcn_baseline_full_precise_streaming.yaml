exp:
  name: tcn_event_intraperson_graph_pool_motion_21_overlap_frac_25_logmeanexp_wind_8_step_1_dataset_v2_precise_streaming
  seed: 42

paths:
  data_root: /home/anna/TCN_TRAIN/datasets/dataset_v2
  runs_root: /home/anna/TCN_TRAIN/runs

data:
  label_mode: binary_tension
  target_mode: last
  window_size: 8
  window_step: 1
  fps: 25
  sample_every_n_frames: 5
  max_persons: 25

  split:
    mode: fixed #generate
    seed: 42
    val_ratio: 0.2
    train_list: "fixed_splits/train_paths.txt"
    val_list: "fixed_splits/val_paths.txt"
    test_list: "fixed_splits/test_files_hospital.txt"

window_labels:
  rule: overlap_frac #soft_last_k #target
  positive_overlap: 0.25
  soft_k: 4

labels:
  mode: binary_tension
  positive_event_id: 4

features:
  use_bbox: true
  use_keypoints: false
  use_quality_gates: true
  normalize: bbox
  motion:
    enabled: true
    source: erez
    align: prev
    num_features: 21
    kp_min_conf: 0.3
    match_min_iou: 0.2
    match_max_center_dist: 0.15
    match_max_size_ratio: 2.5
    match_ambiguity_margin: 0.03
    close_pair_dist_thresh: 0.15
    wrist_near_bbox_thresh: 0.08
    missing_pair_dist: 1.0

model:
  type: tcn
  encoder_type: intraperson_graph
  use_graph: false
  use_attention_readout: false
  causal: true
  norm: group
  hidden_dim: 64
  num_layers: 4
  dilations: [1, 2, 4, 8]
  kernel_size: 3
  dropout: 0.2
  person_emb_dim: 32
  pool_mode: mean_max_std
  tcn_input_mode: pooled_count_motion
  use_person_count: true
  motion_proj_dim: 32

train:
  batch_size: 32
  epochs: 15
  lr: 0.0005
  weight_decay: 0.0001
  pos_weight: 1.5
  grad_clip: 1.0
  early_stop_patience: 5
  num_workers: 0
  device: cuda
  agg_mode: logmeanexp #last
  logsumexp_temperature: 1.0
  end_loss_alpha: 0.0
  end_loss_k: 1
  save_all_checkpoints: true

eval:
  threshold_sweep:
    start: 0.01
    end: 0.99
    step: 0.01
  event_validation:
    enabled: true
    # By default this uses data.split.val_list. Set list to a long-video-only
    # validation file if you want window validation and event validation separate.
    list: "fixed_splits/event_val_paths.txt"
    every_n_epochs: 1
    score_methods: ["raw", "temperature", "platt"]
    threshold_start: 0.01
    threshold_end: 0.99
    threshold_step: 0.02
    merge_gap_sec_values: [0.0, 0.5, 1.0, 2.0]
    min_duration_sec_values: [0.0, 0.5, 1.0]
    min_overlap_sec: 0.0
    min_match_iou: 0.05
    selection_score_method: platt
    selection_metric: time_iou
    max_false_alarms_per_min:
    min_recall:  